name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Prisma
        run: npx prisma generate

      - name: Run Linters
        run: npm run lint

      - name: Build Project
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Need a dummy DATABASE_URL for build if using prisma inside getStaticProps/etc
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: "ci-dummy-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

